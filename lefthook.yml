# Refer for explanation to following link:
# https://lefthook.dev/configuration/
pre-commit:
  parallel: true
  jobs:
    - run: git secrets --pre_commit_hook
    - run: gitleaks protect --staged -v
    - run: ghalint run
    - run: actionlint
    - run: zizmor -p .
    - run: npm run test
    - run: npm run test default.json
    - run: npm run test renovate-config.json

commit-msg:
  jobs:
    - run: npx --no -- commitlint --edit "$1"
