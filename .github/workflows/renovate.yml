name: renovate

on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  renovate:
    name: renovate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: renovate
    permissions:
      contents: write # to renovate
      pull-requests: write # to renovate
    steps:
      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: generate-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          # ref: https://docs.renovatebot.com/security-and-permissions/#global-permissions
          permission-vulnerability-alerts: read
          permission-administration: read
          permission-metadata: read
          permission-checks: write
          permission-contents: write
          permission-statuses: write
          permission-issues: write
          permission-pull-requests: write
          permission-workflows: write
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: renovatebot/github-action@eb932558ad942cccfd8211cf535f17ff183a9f74 # v46.1.9
        env:
          LOG_LEVEL: debug
        with:
          token: ${{ steps.generate-token.outputs.token }}
          configurationFile: renovate-config.json
